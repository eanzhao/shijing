<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>詩經</title>
<meta name="description" content="诗经全文阅读，含生僻字注音与释义">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="app">
  <!-- Sidebar / TOC -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h1 class="logo" id="logo-btn">詩經</h1>
      <p class="logo-sub">風 · 雅 · 頌</p>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="搜索篇目…" autocomplete="off">
    </div>
    <div class="sidebar-toc" id="toc"></div>
    <div class="sidebar-footer">
      <p>全文 305 篇 · 含注音与题解</p>
    </div>
  </nav>

  <!-- Mobile header -->
  <header class="mobile-header" id="mobile-header">
    <button class="menu-btn" id="menu-btn" aria-label="打开目录">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <span class="mobile-title">詩經</span>
    <button class="theme-btn" data-theme-toggle aria-label="切换主题">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- Overlay for mobile sidebar -->
  <div class="overlay" id="overlay"></div>

  <!-- Main content -->
  <main id="main" class="main">
    <!-- Home view -->
    <div id="home-view" class="view active">
      <div class="home-content">
        <div class="home-seal">詩</div>
        <h1 class="home-title">詩 經</h1>
        <p class="home-subtitle">風 · 雅 · 頌</p>
        <p class="home-desc">中國最早的詩歌總集，收錄西周初年至春秋中葉的詩歌三百零五篇。</p>
        <div class="home-sections" id="home-sections"></div>
        <div class="home-quote">
          <p>「詩三百，一言以蔽之，曰：思無邪。」</p>
          <cite>—— 孔子</cite>
        </div>
      </div>
    </div>

    <!-- Poem view -->
    <div id="poem-view" class="view">
      <div class="poem-content">
        <div class="poem-nav-top">
          <button class="back-btn" id="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            <span id="back-label">返回</span>
          </button>
          <div class="poem-position" id="poem-position"></div>
        </div>
        <div class="poem-header">
          <div class="poem-section-label" id="poem-section"></div>
          <h2 class="poem-title" id="poem-title"></h2>
        </div>
        <div class="poem-body" id="poem-body"></div>
        <div class="poem-notes" id="poem-notes"></div>
        <div class="poem-nav-bottom" id="poem-nav-bottom"></div>
      </div>
    </div>

    <!-- Section view -->
    <div id="section-view" class="view">
      <div class="section-content">
        <button class="back-btn" id="section-back-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          返回
        </button>
        <h2 class="section-title" id="section-title"></h2>
        <div class="section-grid" id="section-grid"></div>
      </div>
    </div>
  </main>
</div>

<script src="./data.js"></script>
<script src="./app.js"></script>
</body>
</html>
